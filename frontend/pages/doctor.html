<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Doctor — MediCita</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .btn-asistio { background:#f0fdf4;color:#166534;border:1.5px solid #86efac;border-radius:100px;padding:0.45rem 1rem;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit; }
    .btn-asistio:hover { background:#dcfce7; }
    .btn-no-asistio { background:#fef2f2;color:#991b1b;border:1.5px solid #fca5a5;border-radius:100px;padding:0.45rem 1rem;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit; }
    .btn-no-asistio:hover { background:#fee2e2; }
    .badge-no_asistio { background:#fee2e2;color:#991b1b; }
    .badge-completada { background:#dcfce7;color:#166534; }
    .turno-card {
      background: var(--blanco); border-radius: var(--radio-lg);
      padding: 1.25rem 1.5rem; box-shadow: var(--sombra);
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem;
      border-left: 4px solid var(--menta-dark);
      transition: transform 0.15s;
    }
    .turno-card:hover { transform: translateX(3px); }
    .turno-card.completada { border-left-color: var(--verde); opacity: 0.75; }
    .turno-card.no-asistio { border-left-color: var(--rojo-soft); opacity: 0.75; }
    .turno-hora { font-size: 1.5rem; font-weight: 700; color: var(--verde); min-width: 60px; }
    .turno-paciente { font-weight: 700; font-size: 0.95rem; }
    .turno-motivo { font-size: 0.82rem; color: var(--texto-mid); margin-top: 0.15rem; }
    .turno-acciones { display: flex; gap: 0.5rem; align-items: center; }
    .filtro-fecha { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filtro-fecha input[type=date] { border-radius: var(--radio); max-width: 200px; }
    .resumen-dia {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 1rem; margin-bottom: 1.75rem;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <a href="/" class="nav-logo"><span class="cruz">✚</span> MediCita</a>
    <div class="nav-links">
      <span style="font-size:0.78rem;background:var(--menta);color:var(--verde-dark);padding:0.3rem 1rem;border-radius:100px;font-weight:700">Doctor</span>
      <span id="navNombre" style="font-size:0.88rem;color:var(--texto-mid);font-weight:600"></span>
      <button class="btn btn-outline btn-sm" id="btnLogout">Salir</button>
    </div>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1 id="tituloDoctor">Mis citas</h1>
        <p id="subtituloDoctor">Gestiona la asistencia de tus pacientes</p>
      </div>
    </div>

    <!-- Resumen del día -->
    <div class="resumen-dia">
      <div class="stat-card"><img style="width: 50px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/CIT.png" alt="Total citas" class="stat-icon"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total hoy</div></div>
      <div class="stat-card"><img style="width: 50px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/PEND.png" alt="Pendientes" class="stat-icon"><div class="stat-num" id="statPendientes">—</div><div class="stat-label">Pendientes</div></div>
      <div class="stat-card"><img style="width: 60px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/SI.png" alt="Asistieron" class="stat-icon"><div class="stat-num" id="statAsistieron" style="color:var(--verde)">—</div><div class="stat-label">Asistieron</div></div>
      <div class="stat-card"><img style="width: 60px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/NO.png" alt="No asistieron" class="stat-icon"><div class="stat-num" id="statNoAsistieron" style="color:#991b1b">—</div><div class="stat-label">No asistieron</div></div>
    </div>

    <!-- Filtro por fecha -->
    <div class="filtro-fecha">
      <label style="font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--texto-mid)">Fecha</label>
      <input type="date" id="filtroFecha">
      <button class="btn btn-outline btn-sm" onclick="cargarCitas()">↻ Actualizar</button>
      <button class="btn btn-sm" style="background:var(--menta);color:var(--verde-dark)" onclick="irHoy()">Hoy</button>
    </div>

    <!-- Lista de turnos -->
    <div id="listaTurnos">
      <div style="text-align:center;padding:3rem">
        <span class="loader loader-dark"></span>
        <p style="margin-top:1rem;color:var(--texto-mid)">Cargando citas...</p>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
    if (!token || !usuario || usuario.rol !== 'doctor') window.location.replace('/login');

    document.getElementById('navNombre').textContent = usuario.nombre;
    document.getElementById('btnLogout').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    // Fecha de hoy por defecto
    const hoyStr = new Date().toISOString().split('T')[0];
    document.getElementById('filtroFecha').value = hoyStr;

    function irHoy() {
      document.getElementById('filtroFecha').value = new Date().toISOString().split('T')[0];
      cargarCitas();
    }

    document.getElementById('filtroFecha').addEventListener('change', cargarCitas);

    function formatFecha(f) {
      const [y,m,d] = f.split('-');
      const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return `${d} ${meses[+m-1]} ${y}`;
    }

    async function cargarCitas() {
      const fechaFiltro = document.getElementById('filtroFecha').value;
      const wrap = document.getElementById('listaTurnos');
      wrap.innerHTML = '<div style="text-align:center;padding:2rem"><span class="loader loader-dark"></span></div>';

      try {
        const res = await fetch('/api/admin/citas/doctor', { headers });
        const data = await res.json();

        if (data.error) {
          wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${data.error}</h3><p>Contacta al administrador para vincular tu perfil médico.</p></div>`;
          return;
        }

        document.getElementById('tituloDoctor').textContent = data.medico.nombre;
        document.getElementById('subtituloDoctor').textContent = data.medico.especialidad;

        // Filtrar por fecha seleccionada
        const citas = data.citas.filter(c => c.fecha === fechaFiltro)
          .sort((a,b) => a.hora.localeCompare(b.hora));

        // Calcular resumen
        const total      = citas.length;
        const pendientes = citas.filter(c => c.asistencia === null && c.estado === 'pendiente').length;
        const asistieron = citas.filter(c => c.asistencia === true).length;
        const noAsist    = citas.filter(c => c.asistencia === false).length;

        document.getElementById('statTotal').textContent       = total;
        document.getElementById('statPendientes').textContent  = pendientes;
        document.getElementById('statAsistieron').textContent  = asistieron;
        document.getElementById('statNoAsistieron').textContent = noAsist;

        if (!citas.length) {
          wrap.innerHTML = `<div class="empty-state">
            <img style="width: 100px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/CAL.png" alt="Calendario" class="stat-icon">
            <h3>Sin citas para ${formatFecha(fechaFiltro)}</h3>
            <p>No tienes pacientes programados para este día.</p>
          </div>`;
          return;
        }

        wrap.innerHTML = citas.map(c => {
          const yaRegistrado = c.asistencia !== null;
          let claseCard = 'turno-card';
          if (c.asistencia === true)  claseCard += ' completada';
          if (c.asistencia === false) claseCard += ' no-asistio';

          let acciones = '';
          if (yaRegistrado) {
            acciones = c.asistencia
              ? '<span class="badge badge-completada">✔ Asistió</span>'
              : '<span class="badge badge-no_asistio">✘ No asistió</span>';
          } else {
            acciones = `
              <button class="btn-asistio" onclick="marcarAsistencia('${c.id}', true, this)">✔ Asistió</button>
              <button class="btn-no-asistio" onclick="marcarAsistencia('${c.id}', false, this)">✘ No asistió</button>`;
          }

          return `<div class="${claseCard}" id="turno-${c.id}">
            <div style="display:flex;align-items:center;gap:1.25rem;flex:1">
              <div class="turno-hora">${c.hora}</div>
              <div>
                <div class="turno-paciente"><img style="width: 20px;" src="https://raw.githubusercontent.com/yulkatesp/GestorCitas/main/frontend/img/PAC.png" alt="Paciente" class="stat-icon"> ${c.paciente}</div>
                <div class="turno-motivo">${c.motivo || 'Sin motivo especificado'}</div>
                <div style="font-size:0.78rem;color:var(--texto-light);margin-top:0.1rem">${c.paciente_email}</div>
              </div>
            </div>
            <div class="turno-acciones">${acciones}</div>
          </div>`;
        }).join('');

      } catch(e) {
        wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error al cargar</h3><p>${e.message}</p></div>`;
      }
    }

    async function marcarAsistencia(citaId, asistio, btn) {
      const msg = asistio
        ? '¿Confirmar que el paciente asistió a la consulta?'
        : '⚠️ ¿Confirmar inasistencia? Se aplicará una multa automáticamente al paciente.';
      if (!confirm(msg)) return;

      btn.disabled = true;
      btn.textContent = '...';

      const res = await fetch(`/api/admin/citas/${citaId}/asistencia`, {
        method: 'PATCH', headers,
        body: JSON.stringify({ asistencia: asistio })
      });
      const data = await res.json();

      if (res.ok) {
        // Recargar para reflejar cambio
        cargarCitas();
      } else {
        alert(data.error || 'Error al registrar');
        btn.disabled = false;
        btn.textContent = asistio ? 'Asistió' : 'No asistió';
      }
    }

    cargarCitas();
  </script>
</body>
</html>
